name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Railway Login
        run: railway login --token "${{ secrets.RAILWAY_TOKEN }}"

      - name: Create Railway Project
        run: railway init --token "${{ secrets.RAILWAY_TOKEN }}"
        continue-on-error: true

      - name: Set Variables
        run: |
          railway variables set TELEGRAM_TOKEN "${{ secrets.TELEGRAM_TOKEN }}"
          railway variables set GEMINI_KEY "${{ secrets.GEMINI_KEY }}"
          railway variables set OWNER_ID "${{ secrets.OWNER_ID }}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy
        run: railway up --token "${{ secrets.RAILWAY_TOKEN }}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
